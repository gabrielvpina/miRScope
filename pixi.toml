[workspace]
name = "mirscope"
version = "0.1.0"
description = "Ferramenta para análise comparativa e conservação evolutiva de microRNAs (miRNAs)"
authors = ["Tatyana Chagas Moura / BiovirLab"]
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
python = "3.10.*"
mafft = "*"
pandas = "*"
matplotlib = "*"
biopython = "*"
numpy = "*"
openpyxl = "*"
xlsxwriter = "*"
pytest = "*"
streamlit = "*"
plotly = "*"

[pypi-dependencies]
# Installs the package editable so the `mirscope` command is registered
# in the environment's bin (available via `pixi run mirscope`).
mirscope = { path = ".", editable = true }

[tasks]
macro = "mirscope macro"
strict = "mirscope strict"
test = "pytest mirscope/test -v"
